# ─────────────────────────────────────────────
# Auto TC Generator – Configuration
# ─────────────────────────────────────────────

# ── Target type ──────────────────────────────────────────────────────────────
# Controls which parser and test-generator are used.
#   api    → OpenAPIParser  + requests-based pytest
#   python → PythonParser   + function-call pytest
#   lib    → (stub) C/C++ header parser + GTest skeleton
#   auto   → infer from file extension (.yaml/.json → api, .py → python, .h/.hpp → lib)
target:
  type: auto

# ── Local server (for api target) ────────────────────────────────────────────
server:
  base_url: "http://192.168.150.162:8080"
  health_check_path: "/health"
  swagger_paths:
    - "QFEapi.json"

  # ── 서버 에러 응답 방식 ──────────────────────────────────────────────────────
  # standard : HTTP 400/422 반환 (일반 REST 규약)
  # qfe      : 항상 HTTP 200, body의 success/error_code 로 에러 구분
  #            {"success": false, "error_code": <음수>, "msg": "..."}
  error_response_mode: qfe

# ── Watcher ───────────────────────────────────────────────────────────────────
watcher:
  watch_dirs:
    - "./input"
  patterns:
    - "*.yaml"
    - "*.yml"
    - "*.json"
    - "*.py"        # python module input
    - "*.h"
    - "*.hpp"       # C/C++ header input
  debounce_seconds: 2
  polling_interval_secs: 1.5   # WSL PollingObserver (ignored on native Linux/macOS)

# ── AI Agent ──────────────────────────────────────────────────────────────────
# provider: gemini | anthropic | openai
# agent:
#   provider: gemini
#   model: gemini-2.0-flash
#   max_tokens: 4096
#   api_key_env: GEMINI_API_KEY

  # ── other provider examples ────────────────────────────────────────────────
  # provider: anthropic
  # model: claude-haiku-4-5
  # api_key_env: ANTHROPIC_API_KEY

  # provider: openai
  # model: gpt-4o-mini
  # api_key_env: OPENAI_API_KEY

agent:
  provider: ollama
  model: llama3.2:3b
  max_tokens: 256
  api_key_env: OLLAMA_API_KEY

# ── Test generation ───────────────────────────────────────────────────────────
tc_generation:
  dedup_check: true   # skip if endpoint spec fingerprint unchanged

  # Output directories — separated by origin (feedback: overwrite/review/failure 분석 편의)
  output_dirs:
    rule: "./tests/generated/rule"   # deterministic, overwrite-safe
    ai:   "./tests/generated/ai"     # AI edge cases, needs human review

  # Rule-based layer (deterministic, no AI)
  rule_based:
    enabled: true
    include:
      - positive          # happy-path: one valid request per endpoint
      - missing_required  # omit each required field → expect 400/422
      - wrong_type        # pass wrong type per param → expect 400/422
      - boundary          # int min/max edges, empty string, zero
      - invalid_enum      # enum param with unlisted value → expect 400/422
      - semantic_probe    # semantic-tag-based edge cases (base64, threshold, id …)

  # AI layer (edge-case augmentation only)
  ai_augment:
    enabled: true
    max_extra_tc: 2                  # Ollama 8B 최적화
    max_endpoints_to_augment: 1      # 최대 N개 엔드포인트만 AI 생성

# ── Test execution ────────────────────────────────────────────────────────────
runner:
  # Run all three buckets
  test_dirs:
    - "./tests/generated/rule"
    - "./tests/generated/ai"
    - "./tests/manual"
  allure_results_dir: "./reports/allure-results"
  allure_report_dir:  "./reports/allure-report"
  html_report_path:   "./reports/summary.html"
  timeout_seconds: 60

# ── Email notification ────────────────────────────────────────────────────────
email:
  enabled: false
  smtp_host: "smtp.gmail.com"
  smtp_port: 587
  sender: "your@gmail.com"
  password_env: "SMTP_PASSWORD"
  recipients:
    - "recipient@example.com"
  attach_report: your@gmail.com"
  password_env: "SMTP_PASSWORD"
  recipients:
    - "recipient@example.com"
  attach_report: true
