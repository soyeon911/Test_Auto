# ─────────────────────────────────────────────
# Auto TC Generator – Configuration
# ─────────────────────────────────────────────

target:
  type: auto

server:
  base_url: "http://127.0.0.1:8080"
  health_check_path: "/health"
  swagger_paths:
    - "QFEapi.json"

  # standard : HTTP 400/422 기반
  # qfe      : HTTP 200 + success/error_code 기반
  error_response_mode: qfe

  # match / verify 계열 도메인 판정 기준
  # 실제 운영 threshold와 다르면 이 값 수정
  match_threshold: 0

watcher:
  watch_dirs:
    - "./input"
  patterns:
    - "*.yaml"
    - "*.yml"
    - "*.json"
    - "*.py"
    - "*.h"
    - "*.hpp"
  debounce_seconds: 2
  polling_interval_secs: 1.5

agent:
  provider: ollama
  model: llama3.1:8b
  max_tokens: 256
  api_key_env: OLLAMA_API_KEY

tc_generation:
  dedup_check: true

  semantic_tagging:
    reset_cache: true
    cache_file: ".cache/semantic_tags.json"

  output_dirs:
    rule: "./tests/generated/rule"
    ai: "./tests/generated/ai"

  rule_based:
    enabled: true
    include:
      - positive
      - missing_required
      - wrong_type
      - boundary
      - input_validation   # formerly semantic_probe; invalid_enum removed (no enum in QFEapi.json)
      - raw_image_relation

  ai_augment:
    enabled: false
    max_extra_tc: 2

runner:
  test_dirs:
    - "./tests/generated/rule"
    - "./tests/generated/ai"
    - "./tests/manual"
  allure_results_dir: "./reports/allure-results"
  allure_report_dir: "./reports/allure-report"
  html_report_path: "./reports/summary.html"
  timeout_seconds: 90

email:
  enabled: false
  smtp_host: "smtp.gmail.com"
  smtp_port: 587
  sender: "your@gmail.com"
  password_env: "SMTP_PASSWORD"
  recipients:
    - "recipient@example.com"
  attach_report: true

# ─────────────────────────────────────────────
# Experiment — Step 1 / 2 / 3 비교 실험
# ─────────────────────────────────────────────
#
#  Step 1 : AI 단독 TC 생성  (rule 없음)
#  Step 2 : Rule + AI 동시 생성, 중복 허용 → 중복 수 리포트
#  Step 3 : Rule + AI 동시 생성, AI에서 중복 제거 후 저장
#
experiment:
  step: 3                                  # 1 | 2 | 3

  # max_extra_tc : AI 가 endpoint 당 최대 추가 생성할 TC 수
  #   Step 1 → 이 값의 3배 적용  (rule 없으니 더 많이)
  #   Step 2/3 → 그대로 적용
  max_extra_tc: 5

  # 멀티 프로바이더 비교 실험 목록
  # 비어 있으면 agent.provider 단일 설정으로 fallback
  providers:
    - provider: gemini
      model: gemini-2.0-flash
      api_key_env: GEMINI_API_KEY
      max_tokens: 4096

    # - provider: openai
    #   model: gpt-4o-mini
    #   api_key_env: OPENAI_API_KEY
    #   max_tokens: 4096

    - provider: anthropic
      model: claude-3-5-haiku-20241022
      api_key_env: ANTHROPIC_API_KEY
      max_tokens: 4096

  # 결과 저장 루트 : tests/generated/step{N}/{provider}/rule | ai
  output_base: "./tests/generated"

  # 실험 결과 요약 리포트 경로
  report_path: "./reports/experiment_report.json"

  # TC 수준 상세 리포트 (CSV)
  tc_report_path: "./reports/experiment_tc_report.csv"