openapi: 3.0.4
info:
  title: Math API
  version: 1.0.0
  description: |
    Sample Math API for automated test generation.
    Designed to exercise positive, missing-field, wrong-type, boundary,
    and business-rule test cases.

servers:
  - url: http://localhost:8000
    description: Local test server

paths:
  /sum:
    post:
      summary: Add two numbers
      operationId: addNumbers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BinaryOpRequest'
            examples:
              basic:
                value:
                  a: 10
                  b: 20
      responses:
        "200":
          description: Sum result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationResult'
        "400":
          description: Invalid input

  /sub:
    post:
      summary: Subtract two numbers
      operationId: subtractNumbers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BinaryOpRequest'
            examples:
              basic:
                value:
                  a: 30
                  b: 12
      responses:
        "200":
          description: Subtraction result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationResult'
        "400":
          description: Invalid input

  /mul:
    post:
      summary: Multiply two numbers
      operationId: multiplyNumbers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BinaryOpRequest'
      responses:
        "200":
          description: Multiplication result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationResult'
        "400":
          description: Invalid input

  /div:
    post:
      summary: Divide two numbers
      operationId: divideNumbers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DivisionRequest'
      responses:
        "200":
          description: Division result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationResult'
        "400":
          description: Invalid input
        "422":
          description: Division by zero or invalid domain

  /pow:
    post:
      summary: Raise a to the power of b
      operationId: powerNumbers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PowerRequest'
      responses:
        "200":
          description: Power result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationResult'
        "400":
          description: Invalid input
        "422":
          description: Domain error

  /calc/{op}:
    get:
      summary: Calculate by query parameters
      operationId: calculateByQuery
      parameters:
        - name: op
          in: path
          required: true
          description: Operation type
          schema:
            type: string
            enum: [sum, sub, mul, div]
        - name: a
          in: query
          required: true
          description: First operand
          schema:
            type: integer
            minimum: -1000000
            maximum: 1000000
        - name: b
          in: query
          required: true
          description: Second operand
          schema:
            type: integer
            minimum: -1000000
            maximum: 1000000
        - name: round
          in: query
          required: false
          description: Round mode
          schema:
            type: string
            enum: [none, floor, ceil]
      responses:
        "200":
          description: Calculation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationResult'
        "400":
          description: Invalid input
        "422":
          description: Semantic error such as division by zero

components:
  schemas:
    BinaryOpRequest:
      type: object
      required:
        - a
        - b
      properties:
        a:
          type: integer
          description: First operand
          minimum: -2147483648
          maximum: 2147483647
        b:
          type: integer
          description: Second operand
          minimum: -2147483648
          maximum: 2147483647

    DivisionRequest:
      type: object
      required:
        - a
        - b
      properties:
        a:
          type: number
          format: double
          minimum: -1000000000
          maximum: 1000000000
        b:
          type: number
          format: double
          minimum: -1000000000
          maximum: 1000000000
          description: Must not be zero

    PowerRequest:
      type: object
      required:
        - a
        - b
      properties:
        a:
          type: number
          format: double
          minimum: -10000
          maximum: 10000
        b:
          type: integer
          minimum: -10
          maximum: 10

    OperationResult:
      type: object
      required:
        - result
        - operation
      properties:
        result:
          type: number
          format: double
        operation:
          type: string
          enum: [sum, sub, mul, div, pow]
        input:
          type: object
          additionalProperties: true