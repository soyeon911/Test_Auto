name: Crash Probe

on:
  workflow_dispatch:

jobs:
  crash-probe:
    runs-on: self-hosted

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # ─────────────────────────────
    # 1. 서버 최초 기동
    # ─────────────────────────────
    - name: Start QFE Server
      id: start_server
      shell: pwsh
      run: |
        [Console]::OutputEncoding = [System.Text.Encoding]::UTF8

        $serverExe = Join-Path $env:SERVER_DIR $env:SERVER_EXE_NAME
        $logDir    = $env:SERVER_LOG_DIR

        New-Item -ItemType Directory -Path $logDir -Force | Out-Null

        $stdinFile = Join-Path $logDir "init_stdin.txt"
        $stdoutLog = Join-Path $logDir "init_stdout.log"
        $stderrLog = Join-Path $logDir "init_stderr.log"

        @(
          $env:SERVER_LICENSE_KEY
          $env:SERVER_MODE_CHOICE
          $env:SERVER_INSTANCE_COUNT
          $env:SERVER_MODEL_PATH
          $env:SERVER_DB_PATH
          ""
        ) | Set-Content -Path $stdinFile -Encoding ascii

        # 포트 정리
        $lines = netstat -ano -p tcp | Select-String ":8080\s"
        foreach ($line in $lines) {
          if ($line.ToString() -match "LISTENING\s+(\d+)") {
            try { Stop-Process -Id ([int]$matches[1]) -Force } catch {}
          }
        }

        Start-Sleep -Seconds 1

        $proc = Start-Process `
          -FilePath $serverExe `
          -WorkingDirectory $env:SERVER_DIR `
          -ArgumentList "-host 0.0.0.0" `
          -RedirectStandardInput  $stdinFile `
          -RedirectStandardOutput $stdoutLog `
          -RedirectStandardError  $stderrLog `
          -PassThru `
          -WindowStyle Hidden

        "SERVER_PID=$($proc.Id)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        Write-Host "[Server] PID=$($proc.Id)"

        # health check
        $healthUrl = "$env:BASE_URL$env:HEALTH_CHECK_PATH"
        for ($i=0; $i -lt 30; $i++) {
          Start-Sleep 1
          try {
            $r = Invoke-WebRequest $healthUrl -UseBasicParsing -TimeoutSec 2
            if ($r.StatusCode -eq 200) {
              Write-Host "[Server] Ready"
              exit 0
            }
          } catch {}
        }

        Write-Host "::error::Server failed to start"
        exit 1

    # ─────────────────────────────
    # 2. Crash Probe 실행
    # ─────────────────────────────
    - name: Run Crash Probe
      id: crash_probe
      shell: pwsh
      run: |
        [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
        $env:PYTHONIOENCODING = "utf-8"

        $healthUrl   = "$env:BASE_URL$env:HEALTH_CHECK_PATH"
        $reportDir   = $env:PROBE_REPORT_DIR
        New-Item -ItemType Directory -Path $reportDir -Force | Out-Null

        # pytest 실행
        $reportFile = "$reportDir\report.json"

        python -m pytest tests/manual/test_crash_probes.py `
          --base-url $env:BASE_URL `
          --json-report `
          --json-report-file=$reportFile `
          -v

        $exitCode = $LASTEXITCODE

        # 서버 생존 확인
        $alive = $false
        try {
          $r = Invoke-WebRequest $healthUrl -UseBasicParsing -TimeoutSec 2
          $alive = ($r.StatusCode -eq 200)
        } catch {}

        if ($alive) {
          Write-Host "[Probe] 서버 정상"
          $crashCount = 0
        } else {
          Write-Host "[Probe] 서버 크래시 감지"
          $crashCount = 1
        }

        if ($exitCode -eq 0) {
          $probeExit = "0"
        } else {
          $probeExit = "1"
        }

        "crash_count=$crashCount" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
        "probe_exit=$probeExit"   | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8

    # ─────────────────────────────
    # 3. 결과 판정
    # ─────────────────────────────
    - name: Final Result
      if: always()
      shell: pwsh
      run: |
        [Console]::OutputEncoding = [System.Text.Encoding]::UTF8

        $crashCount = "${{ steps.crash_probe.outputs.crash_count }}"
        $probeExit  = "${{ steps.crash_probe.outputs.probe_exit }}"

        Write-Host "[Result] crash_count=$crashCount probe_exit=$probeExit"

        if ([string]::IsNullOrWhiteSpace($crashCount)) {
          Write-Host "::error::crash_count 없음"
          exit 1
        }

        if ($crashCount -ne "0") {
          Write-Host "::error::CRASH DETECTED"
          exit 1
        }

        if ($probeExit -ne "0") {
          Write-Host "::warning::테스트 실패"
          exit 1
        }

        Write-Host "[Result] SUCCESS"

    # ─────────────────────────────
    # 4. 서버 종료
    # ─────────────────────────────
    - name: Cleanup
      if: always()
      shell: pwsh
      run: |
        if ($env:SERVER_PID) {
          Write-Host "[Cleanup] PID=$env:SERVER_PID 종료"
          try { Stop-Process -Id $env:SERVER_PID -Force } catch {}
        }

    env:
      BASE_URL: http://127.0.0.1:8080
      SERVER_DIR: C:\Users\sypark5\TestAgent\qfe-api-server-no-license
      SERVER_EXE_NAME: qfe-server.exe
      SERVER_LICENSE_KEY: 1
      SERVER_MODE_CHOICE: 1
      SERVER_INSTANCE_COUNT: 1
      SERVER_MODEL_PATH: C:\Users\sypark5\TestAgent\qfe-api-server-no-license\model
      SERVER_DB_PATH: C:\Users\sypark5\TestAgent\qfe-api-server-no-license\face_database.db
      SERVER_LOG_DIR: server_logs
      PROBE_REPORT_DIR: reports/crash_probe
      HEALTH_CHECK_PATH: /health