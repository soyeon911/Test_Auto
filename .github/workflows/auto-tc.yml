name: .github/workflows/auto-tc.yml

on:
  schedule:
    - cron: '0 * * * *'

  push:
    paths:
      - 'QFEapi.json'
      - '.github/workflows/auto-tc.yml'


  workflow_dispatch:
    inputs:
      force_run:
        description: '변경 없어도 강제 실행'
        required: false
        default: 'false'
        type: boolean
      base_url:
        description: '서버 Base URL (기본값: http://127.0.0.1:8080)'
        required: false
        default: ''
      reset_semantic_cache:
        description: 'semantic cache 강제 초기화'
        required: false
        default: 'true'
        type: boolean
      match_threshold:
        description: 'match/verify score threshold'
        required: false
        default: '0'
      run_crash_probe:
        description: 'Crash Probe job 강제 실행 (변경 감지와 무관하게 실행)'
        required: false
        default: 'false'
        type: boolean
      probe_filter:
        description: 'Crash Probe pytest -k 필터 (예: enroll or match)'
        required: false
        default: ''

defaults:
  run:
    shell: powershell

jobs:
  detect-changes:
    name: 변경 감지 (Swagger Hash + Server Version)
    runs-on: [self-hosted, windows]

    outputs:
      should_run: ${{ steps.compare.outputs.should_run }}
      swagger_hash: ${{ steps.hash.outputs.swagger_hash }}
      server_version: ${{ steps.server_version.outputs.version }}
      swagger_source: ${{ steps.server_version.outputs.swagger_source }}

    env:
      BASE_URL: ${{ inputs.base_url != '' && inputs.base_url || 'http://127.0.0.1:8080' }}
      SERVER_DIR: C:\Users\sypark5\TestAgent\qfe-api-server-no-license
      SERVER_EXE_NAME: qfe-server.exe
      SERVER_LICENSE_KEY: 1
      SERVER_MODE_CHOICE: 1
      SERVER_INSTANCE_COUNT: 1
      SERVER_MODEL_PATH: C:\Users\sypark5\TestAgent\qfe-api-server-no-license\model
      SERVER_DB_PATH: C:\Users\sypark5\TestAgent\qfe-api-server-no-license\face_database.db
      SERVER_LOG_DIR: server_logs
      HEALTH_CHECK_PATH: /health
      PYTHONIOENCODING: utf-8

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Python 환경 설정
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 의존성 설치
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $OutputEncoding = [System.Text.Encoding]::UTF8
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: API 서버 실행·버전 조회 (job1 detect)
        id: server_version
        shell: powershell
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $OutputEncoding = [System.Text.Encoding]::UTF8
          $PSDefaultParameterValues['Out-File:Encoding'] = 'utf8'

          $serverExe = Join-Path $env:SERVER_DIR $env:SERVER_EXE_NAME
          $stdoutLog = Join-Path $env:SERVER_LOG_DIR "detect_server_stdout.log"
          $stderrLog = Join-Path $env:SERVER_LOG_DIR "detect_server_stderr.log"
          $serverPort = 8080

          Remove-Item $stdoutLog, $stderrLog -Force -ErrorAction SilentlyContinue

          function Get-PortPids {
            param([int]$Port)

            $lines = netstat -ano -p tcp | Select-String ":$Port\s"
            $pids = @()

            foreach ($line in $lines) {
              $text = $line.ToString().Trim()
              if ($text -match "^\s*TCP\s+\S+:$Port\s+\S+\s+LISTENING\s+(\d+)\s*$") {
                $pids += [int]$matches[1]
              }
            }

            return $pids | Sort-Object -Unique
          }

          function Stop-PortListeners {
            param([int]$Port)

            $pids = Get-PortPids -Port $Port
            if (-not $pids -or $pids.Count -eq 0) {
              Write-Host "[Detect Server] no existing listener on port $Port"
              return
            }

            Write-Host "[Detect Server] found listener(s) on port $Port : $($pids -join ', ')"

            foreach ($procPid in $pids) {
              try {
                $procInfo = Get-CimInstance Win32_Process -Filter "ProcessId = $procPid" -ErrorAction Stop
                Write-Host "[Detect Server] stopping PID=$procPid Name=$($procInfo.Name)"
                Stop-Process -Id $procPid -Force -ErrorAction Stop
              }
              catch {
                Write-Warning "[Detect Server] failed to stop PID=$procPid : $($_.Exception.Message)"
              }
            }

            Start-Sleep -Seconds 2

            $remaining = Get-PortPids -Port $Port
            if ($remaining -and $remaining.Count -gt 0) {
              throw "Port $Port is still in use after cleanup. Remaining PID(s): $($remaining -join ', ')"
            }
          }

          Stop-PortListeners -Port $serverPort

          $psi = New-Object System.Diagnostics.ProcessStartInfo
          $psi.FileName = $serverExe
          $psi.WorkingDirectory = $env:SERVER_DIR
          $psi.Arguments = "-host 0.0.0.0"
          $psi.UseShellExecute = $false
          $psi.RedirectStandardInput = $true
          $psi.RedirectStandardOutput = $true
          $psi.RedirectStandardError = $true
          $psi.CreateNoWindow = $true

          $proc = New-Object System.Diagnostics.Process
          $proc.StartInfo = $psi
          $proc.Start() | Out-Null

          Start-Sleep -Milliseconds 500

          $proc.StandardInput.WriteLine($env:SERVER_LICENSE_KEY)
          $proc.StandardInput.WriteLine($env:SERVER_MODE_CHOICE)
          $proc.StandardInput.WriteLine($env:SERVER_INSTANCE_COUNT)
          $proc.StandardInput.WriteLine($env:SERVER_MODEL_PATH)
          $proc.StandardInput.WriteLine($env:SERVER_DB_PATH)
          $proc.StandardInput.Flush()
          $proc.StandardInput.Close()

          $healthUrl = "$($env:BASE_URL)$($env:HEALTH_CHECK_PATH)"
          $ready = $false

          try {
            for ($i = 0; $i -lt 20; $i++) {
              Start-Sleep -Seconds 1

              if ($proc.HasExited) {
                break
              }

              try {
                $resp = Invoke-WebRequest -Uri $healthUrl -UseBasicParsing -TimeoutSec 3
                if ($resp.StatusCode -eq 200) {
                  $ready = $true
                  break
                }
              }
              catch {}
            }

            if ($proc.HasExited -or -not $ready) {
              if (-not $proc.HasExited) { $proc.Kill(); $proc.WaitForExit(5000) }
              $outText = $proc.StandardOutput.ReadToEnd()
              $errText = $proc.StandardError.ReadToEnd()

              $outText | Out-File -FilePath $stdoutLog -Encoding utf8
              $errText | Out-File -FilePath $stderrLog -Encoding utf8

              Write-Host "[Detect Server] stdout:"
              Get-Content $stdoutLog -ErrorAction SilentlyContinue
              Write-Host "[Detect Server] stderr:"
              Get-Content $stderrLog -ErrorAction SilentlyContinue

              throw "detect-changes용 서버가 정상 기동하지 않았습니다. exit=$($proc.ExitCode)"
            }

            Write-Host "[Detect Server] started pid=$($proc.Id)"

            # ── 서버 버전 조회 ────────────────────────────────────────────────
            $baseUrl = "http://127.0.0.1:8080"
            if ("${{ inputs.base_url }}" -ne "") { $baseUrl = "${{ inputs.base_url }}" }

            $version = "unknown"
            $swaggerSource = ""

            # QFE 서버 버전: GET /api/v2/info -> { data: { version: "x.x.x" } }
            try {
              $resp = Invoke-RestMethod -Uri "$baseUrl/api/v2/info" -TimeoutSec 5 -ErrorAction Stop
              if ($null -ne $resp.data.version -and "$($resp.data.version)".Trim() -ne "") {
                $version = [string]$resp.data.version
                Write-Host "[Version] /api/v2/info -> $version"
              }
            }
            catch {
              Write-Host "[Version] /api/v2/info 실패: $($_.Exception.Message)"
            }

            # Swagger 소스: 로컬 파일 우선, 없으면 빈 문자열
            $localSwagger = @("input/QFEapi.json", "input/QFEapi.yaml", "QFEapi.json", "QFEapi.yaml")
            foreach ($f in $localSwagger) {
              if (Test-Path $f) {
                $swaggerSource = (Resolve-Path $f).Path
                Write-Host "[Version] Swagger Source (local): $swaggerSource"
                break
              }
            }

            Write-Host "[Version] 최종 서버 버전: $version"
            Write-Host "[Version] Swagger Source: $swaggerSource"
            "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "swagger_source=$swaggerSource" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }
          finally {
            # ── 서버 종료 (항상 실행) ─────────────────────────────────────────
            if ($proc -and -not $proc.HasExited) {
              try {
                Stop-Process -Id $proc.Id -Force -ErrorAction Stop
                Write-Host "[Detect Server] stopped PID=$($proc.Id)"
              }
              catch {
                Write-Warning "[Detect Server] failed to stop PID=$($proc.Id) : $($_.Exception.Message)"
              }
            }
          }

      - name: Swagger Hash 계산
        id: hash
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $OutputEncoding = [System.Text.Encoding]::UTF8
          $PSDefaultParameterValues['Out-File:Encoding'] = 'utf8'

          $swaggerFiles = @()
          if (Test-Path "input") {
            $swaggerFiles += Get-ChildItem -Path "input" -Include "*.yaml","*.yml","*.json" -Recurse
          }
          foreach ($extra in @("QFEapi.yaml","QFEapi.json")) {
            if (Test-Path $extra) { $swaggerFiles += Get-Item $extra }
          }

          if ($swaggerFiles.Count -eq 0) {
            Write-Error "Swagger 파일을 찾을 수 없습니다."
            exit 1
          }

          $hasher = [System.Security.Cryptography.SHA256]::Create()
          $combined = ""

          foreach ($f in ($swaggerFiles | Sort-Object FullName -Unique)) {
            $bytes = [System.IO.File]::ReadAllBytes($f.FullName)
            $h = [System.BitConverter]::ToString($hasher.ComputeHash($bytes)).Replace("-", "").ToLower()
            $combined += "$($f.Name):$h;"
            Write-Host "[Hash] $($f.Name) -> $h"
          }

          $finalHash = [System.BitConverter]::ToString(
            $hasher.ComputeHash([System.Text.Encoding]::UTF8.GetBytes($combined))
          ).Replace("-", "").ToLower()

          Write-Host "[Hash] 최종 Swagger 해시: $finalHash"
          "swagger_hash=$finalHash" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8


      - name: 이전 캐시와 비교
        id: compare
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $OutputEncoding = [System.Text.Encoding]::UTF8
          $PSDefaultParameterValues['Out-File:Encoding'] = 'utf8'

          $forceRun = "${{ inputs.force_run }}" -eq "true"
          $cacheFile = ".cache\last_run_state.txt"
          $currentKey = "${{ steps.hash.outputs.swagger_hash }}::${{ steps.server_version.outputs.version }}"

          Write-Host "[Compare] 현재 상태 키: $currentKey"

          if ($forceRun) {
            Write-Host "[Compare] 강제 실행 요청 -> 실행"
            "should_run=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            exit 0
          }

          if (-not (Test-Path $cacheFile)) {
            Write-Host "[Compare] 캐시 없음 (최초 실행) -> 실행"
            "should_run=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            exit 0
          }

          $cachedKey = (Get-Content $cacheFile -Raw -Encoding utf8).Trim()
          Write-Host "[Compare] 캐시된 상태 키: $cachedKey"

          if ($cachedKey -eq $currentKey) {
            Write-Host "[Compare] 변경 없음 -> 스킵"
            "should_run=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }
          else {
            Write-Host "[Compare] 변경 감지됨 -> 실행"
            "should_run=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }

  run-pipeline:
    name: AutoTC 파이프라인 실행
    needs: detect-changes
    if: needs.detect-changes.outputs.should_run == 'true'
    runs-on: [self-hosted, windows]

    env:
      BASE_URL: ${{ inputs.base_url != '' && inputs.base_url || 'http://127.0.0.1:8080' }}
      SERVER_DIR: C:\Users\sypark5\TestAgent\qfe-api-server-no-license
      SERVER_EXE_NAME: qfe-server.exe
      SERVER_LICENSE_KEY: 1
      SERVER_MODE_CHOICE: 1
      SERVER_INSTANCE_COUNT: 1
      SERVER_MODEL_PATH: C:\Users\sypark5\TestAgent\qfe-api-server-no-license\model
      SERVER_DB_PATH: C:\Users\sypark5\TestAgent\qfe-api-server-no-license\face_database.db
      REPORT_DIR: reports
      CRASH_LOG_DIR: crash_logs
      SERVER_LOG_DIR: server_logs
      # 서버 stderr 로그 파일 경로 (conftest crash guard / build_diag 가 읽음)
      SWAGGER_SOURCE: ${{ needs.detect-changes.outputs.swagger_source }}
      SERVER_LOG_FILE: server_logs/server_stderr.log
      LLM_PROVIDER: ollama
      LLM_MODEL: llama3.1:8b
      OLLAMA_BASE_URL: http://localhost:11434
      PYTHONIOENCODING: utf-8
      HEALTH_CHECK_PATH: /health
      RESET_SEMANTIC_CACHE: ${{ inputs.reset_semantic_cache != '' && inputs.reset_semantic_cache || 'true' }}
      MATCH_THRESHOLD: ${{ inputs.match_threshold != '' && inputs.match_threshold || '0' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Python 환경 설정
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 의존성 설치
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $OutputEncoding = [System.Text.Encoding]::UTF8
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 서버 파일 사전 점검
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $OutputEncoding = [System.Text.Encoding]::UTF8

          $serverExe = Join-Path $env:SERVER_DIR $env:SERVER_EXE_NAME

          if (-not (Test-Path $env:SERVER_DIR)) {
            throw "서버 디렉터리가 없습니다: $env:SERVER_DIR"
          }

          if (-not (Test-Path $serverExe)) {
            throw "서버 실행 파일이 없습니다: $serverExe"
          }

          if (-not (Test-Path $env:SERVER_MODEL_PATH)) {
            throw "모델 경로가 없습니다: $env:SERVER_MODEL_PATH"
          }

          if (-not (Test-Path $env:SERVER_DB_PATH)) {
            throw "DB 파일이 없습니다: $env:SERVER_DB_PATH"
          }

          New-Item -ItemType Directory -Path $env:SERVER_LOG_DIR -Force | Out-Null

          Write-Host "[Server] dir: $env:SERVER_DIR"
          Write-Host "[Server] exe: $serverExe"
          Write-Host "[Server] model: $env:SERVER_MODEL_PATH"
          Write-Host "[Server] db: $env:SERVER_DB_PATH"

      - name: API 서버 실행 (job2 test)
        id: start_server_test
        shell: powershell
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $OutputEncoding = [System.Text.Encoding]::UTF8
          $PSDefaultParameterValues['Out-File:Encoding'] = 'utf8'

          $serverExe = Join-Path $env:SERVER_DIR $env:SERVER_EXE_NAME
          $stdoutLog = Join-Path $env:SERVER_LOG_DIR "server_stdout.log"
          $stderrLog = Join-Path $env:SERVER_LOG_DIR "server_stderr.log"
          $serverPort = 8080

          Remove-Item $stdoutLog, $stderrLog -Force -ErrorAction SilentlyContinue

          function Get-PortPids {
            param([int]$Port)

            $lines = netstat -ano -p tcp | Select-String ":$Port\s"
            $pids = @()

            foreach ($line in $lines) {
              $text = $line.ToString().Trim()
              if ($text -match "^\s*TCP\s+\S+:$Port\s+\S+\s+LISTENING\s+(\d+)\s*$") {
                $pids += [int]$matches[1]
              }
            }

            return $pids | Sort-Object -Unique
          }

          function Stop-PortListeners {
            param([int]$Port)

            $pids = Get-PortPids -Port $Port
            if (-not $pids -or $pids.Count -eq 0) {
              Write-Host "[Test Server] no existing listener on port $Port"
              return
            }

            Write-Host "[Test Server] found listener(s) on port $Port : $($pids -join ', ')"

            foreach ($listenerpid in $pids) {
              try {
                $procInfo = Get-CimInstance Win32_Process -Filter "ProcessId = $listenerpid" -ErrorAction Stop
                Write-Host "[Test Server] stopping PID=$listenerpid Name=$($procInfo.Name)"
                Stop-Process -Id $listenerpid -Force -ErrorAction Stop
              }
              catch {
                Write-Warning "[Test Server] failed to stop PID=$listenerpid : $($_.Exception.Message)"
              }
            }

            Start-Sleep -Seconds 2

            $remaining = Get-PortPids -Port $Port
            if ($remaining -and $remaining.Count -gt 0) {
              throw "Port $Port is still in use after cleanup. Remaining PID(s): $($remaining -join ', ')"
            }
          }

          Stop-PortListeners -Port $serverPort

          # ── Start-Process + 파일 리다이렉션 ─────────────────────────────────
          # 파이프(RedirectStandardOutput=true) 방식은 스텝 종료 시 파이프가 닫혀
          # 서버 프로세스가 죽는 문제가 있음. Start-Process + 파일 리다이렉션으로
          # 부모 PowerShell 수명과 독립적인 프로세스를 생성.
          $stdinFile = Join-Path $env:SERVER_LOG_DIR "server_stdin.tmp"
          @(
            $env:SERVER_LICENSE_KEY,
            $env:SERVER_MODE_CHOICE,
            $env:SERVER_INSTANCE_COUNT,
            $env:SERVER_MODEL_PATH,
            $env:SERVER_DB_PATH,
            ""
          ) | Set-Content -Path $stdinFile -Encoding ascii

          $proc = Start-Process `
            -FilePath        $serverExe `
            -WorkingDirectory $env:SERVER_DIR `
            -ArgumentList    "-host 0.0.0.0" `
            -RedirectStandardInput  $stdinFile `
            -RedirectStandardOutput $stdoutLog `
            -RedirectStandardError  $stderrLog `
            -PassThru `
            -WindowStyle Hidden

          Start-Sleep -Milliseconds 500

          "SERVER_PID=$($proc.Id)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "SERVER_STDOUT_LOG=$stdoutLog" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "SERVER_STDERR_LOG=$stderrLog" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

          $healthUrl = "$($env:BASE_URL)$($env:HEALTH_CHECK_PATH)"
          $ready = $false

          for ($i = 0; $i -lt 20; $i++) {
            Start-Sleep -Seconds 1

            if ($proc.HasExited) {
              break
            }

            try {
              $resp = Invoke-WebRequest -Uri $healthUrl -UseBasicParsing -TimeoutSec 3
              if ($resp.StatusCode -eq 200) {
                $ready = $true
                break
              }
            }
            catch {}
          }

          if ($proc.HasExited -or -not $ready) {
            if (-not $proc.HasExited) { $proc.Kill(); $proc.WaitForExit(5000) }

            Write-Host "[Test Server] stdout:"
            Get-Content $stdoutLog -ErrorAction SilentlyContinue
            Write-Host "[Test Server] stderr:"
            Get-Content $stderrLog -ErrorAction SilentlyContinue

            throw "테스트용 서버가 정상 기동하지 않았습니다. exit=$($proc.ExitCode)"
          }

          Write-Host "[Test Server] started pid=$($proc.Id)"

      - name: 서버 health check (테스트 전)
        id: pre_health
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $OutputEncoding = [System.Text.Encoding]::UTF8
          $PSDefaultParameterValues['Out-File:Encoding'] = 'utf8'

          $healthCandidates = @(
            "$env:BASE_URL/health",
            "$env:BASE_URL/health"
          )

          $maxRetries = 20
          $retryDelay = 3
          $serverUp = $false

          foreach ($healthUrl in $healthCandidates) {
            Write-Host "[Health] checking URL: $healthUrl"

            for ($i = 1; $i -le $maxRetries; $i++) {
              try {
                $resp = Invoke-WebRequest -Uri $healthUrl -TimeoutSec 5 -ErrorAction Stop -UseBasicParsing
                if ($null -ne $resp -and $null -ne $resp.StatusCode) {
                  Write-Host "[Health] 응답 코드: $($resp.StatusCode)"
                  if ($resp.StatusCode -lt 500) {
                    $serverUp = $true
                    Write-Host "[Health] OK via $healthUrl"
                    break
                  }
                }
              }
              catch {
                Write-Host "[Health] 시도 $i/$maxRetries 실패 ($healthUrl): $($_.Exception.Message)"
              }

              if ($i -lt $maxRetries) {
                Start-Sleep -Seconds $retryDelay
              }
            }

            if ($serverUp) { break }
          }

          "server_up=$($serverUp.ToString().ToLower())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

          if (-not $serverUp) {
            Write-Host "::warning::서버가 health check에 응답하지 않습니다. 로그를 수집합니다."
          }

      - name: 서버 시작 로그 출력 (실패 시)
        if: steps.pre_health.outputs.server_up == 'false'
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8

          if (Test-Path $env:SERVER_STDOUT_LOG) {
            Write-Host "[Server stdout]"
            Get-Content $env:SERVER_STDOUT_LOG -ErrorAction SilentlyContinue
          }

          if (Test-Path $env:SERVER_STDERR_LOG) {
            Write-Host "[Server stderr]"
            Get-Content $env:SERVER_STDERR_LOG -ErrorAction SilentlyContinue
          }

      - name: Crash 로그 수집 (테스트 전)
        if: steps.pre_health.outputs.server_up == 'false'
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          scripts\collect_crash_logs.ps1 -OutputDir $env:CRASH_LOG_DIR -Label "pre_test"

      - name: Crash 로그 업로드 (테스트 전)
        if: steps.pre_health.outputs.server_up == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: crash-logs-pre-${{ github.run_id }}
          path: ${{ env.CRASH_LOG_DIR }}/
          retention-days: 14

      - name: 서버 로그 업로드 (테스트 전 실패 시)
        if: steps.pre_health.outputs.server_up == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: server-logs-pre-${{ github.run_id }}
          path: ${{ env.SERVER_LOG_DIR }}/
          retention-days: 14

      - name: 서버 다운 시 중단
        if: steps.pre_health.outputs.server_up == 'false'
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          Write-Host "::error::API 서버가 기동되지 않았습니다. server_logs와 crash_logs를 확인하세요."
          exit 1

      - name: 서버 Swagger 다운로드
        id: fetch_swagger
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $OutputEncoding = [System.Text.Encoding]::UTF8
          $PSDefaultParameterValues['Out-File:Encoding'] = 'utf8'

          $swaggerUrl = "$env:SWAGGER_SOURCE".Trim()
          if (-not $swaggerUrl) {
            throw "SWAGGER_SOURCE 가 비어 있습니다. detect-changes 단계에서 Swagger URL을 찾지 못했습니다."
          }

          $downloadDir = "input"
          New-Item -ItemType Directory -Path $downloadDir -Force | Out-Null

          $swaggerPath = Join-Path $downloadDir "server_swagger.json"

          Invoke-WebRequest -Uri $swaggerUrl -OutFile $swaggerPath -TimeoutSec 20 -UseBasicParsing

          if (-not (Test-Path $swaggerPath)) {
            throw "Swagger 다운로드 실패: $swaggerPath"
          }

          try {
            $raw = Get-Content $swaggerPath -Raw -Encoding utf8 | ConvertFrom-Json
            if ($null -eq $raw.paths) {
              throw "다운로드한 파일에 paths 가 없습니다."
            }
          }
          catch {
            throw "다운로드한 Swagger 검증 실패: $($_.Exception.Message)"
          }

          Write-Host "[Swagger] downloaded: $swaggerUrl -> $swaggerPath"
          "DOWNLOADED_SWAGGER=$swaggerPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Ollama health check
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $OutputEncoding = [System.Text.Encoding]::UTF8

          try {
            $resp = Invoke-RestMethod -Uri "$env:OLLAMA_BASE_URL/api/tags" -Method Get -TimeoutSec 10
            if (-not $resp.models) {
              Write-Error "Ollama is reachable but no models are installed."
              exit 1
            }

            $models = @($resp.models | ForEach-Object { $_.name })
            Write-Host "[Ollama] Installed models: $($models -join ', ')"

            if ($models -notcontains $env:LLM_MODEL) {
              Write-Error "Required model '$env:LLM_MODEL' is not installed in Ollama."
              exit 1
            }
          }
          catch {
            Write-Error "Ollama health check failed: $($_.Exception.Message)"
            exit 1
          }

      - name: 기존 생성 TC 삭제
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          if (Test-Path "tests\generated\rule") { Remove-Item "tests\generated\rule\*" -Recurse -Force }
          if (Test-Path "tests\generated\ai") { Remove-Item "tests\generated\ai\*" -Recurse -Force }
      
      
      - name: config override 적용
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $OutputEncoding = [System.Text.Encoding]::UTF8
          $configPath = "config.yaml"

          if (-not (Test-Path $configPath)) {
            if (Test-Path "config\config.yaml") {
              $configPath = "config\config.yaml"
            } else {
              throw "config.yaml 파일을 찾을 수 없습니다."
            }
          }

          Write-Host "[Config] using $configPath"
          $text = Get-Content $configPath -Raw -Encoding UTF8

          $text = [regex]::Replace(
            $text,
            '(?m)^(\s*reset_cache:\s*).*$',
            "`${1}$env:RESET_SEMANTIC_CACHE"
          )

          $text = [regex]::Replace(
            $text,
            '(?m)^(\s*match_threshold:\s*).*$',
            "`${1}$env:MATCH_THRESHOLD"
          )

          Set-Content -Path $configPath -Value $text -Encoding UTF8

          Write-Host "[Config] reset_cache=$env:RESET_SEMANTIC_CACHE"
          Write-Host "[Config] match_threshold=$env:MATCH_THRESHOLD"
          

      - name: TC 생성 (generate)
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $OutputEncoding = [System.Text.Encoding]::UTF8
          $env:PYTHONIOENCODING = "utf-8"

          if (-not $env:DOWNLOADED_SWAGGER -or -not (Test-Path $env:DOWNLOADED_SWAGGER)) {
            Write-Error "다운로드된 Swagger 파일이 없습니다: $env:DOWNLOADED_SWAGGER"
            exit 1
          }

          Write-Host "[Generate] 사용 파일: $env:DOWNLOADED_SWAGGER"
          python main.py generate "$env:DOWNLOADED_SWAGGER"

      - name: 테스트 실행
        id: pytest
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $OutputEncoding = [System.Text.Encoding]::UTF8
          $PSDefaultParameterValues['Out-File:Encoding'] = 'utf8'

          New-Item -ItemType Directory -Path $env:REPORT_DIR -Force | Out-Null

          # allure-results 초기화 — 이전 실행 결과가 섞이지 않도록 매 실행 전 비움
          $allureDir = "$env:REPORT_DIR\allure-results"
          if (Test-Path $allureDir) {
            Remove-Item "$allureDir\*" -Recurse -Force -ErrorAction SilentlyContinue
            Write-Host "[Pytest] allure-results 초기화 완료: $allureDir"
          } else {
            New-Item -ItemType Directory -Path $allureDir -Force | Out-Null
          }

          $testDirs = @()
          foreach ($d in @("tests\generated\rule", "tests\generated\ai")) {
            if (Test-Path $d) { $testDirs += $d }
          }

          if ($testDirs.Count -eq 0) {
            Write-Host "::warning::실행할 테스트 디렉터리가 없습니다."
            "exit_code=0" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            exit 0
          }

          Write-Host "[Pytest] 테스트 디렉터리: $($testDirs -join ', ')"

          $pytestArgs = @(
            "-m", "pytest"
          ) + $testDirs + @(
            "--base-url", $env:BASE_URL,
            "--html=$env:REPORT_DIR\summary.html",
            "--self-contained-html",
            "--json-report",
            "--json-report-file=$env:REPORT_DIR\report.json",
            "--alluredir=$allureDir",
            "-v",
            "--tb=short"
          )

          & python @pytestArgs 2>&1 | Tee-Object -FilePath "$env:REPORT_DIR\pytest_output.txt"
          $code = $LASTEXITCODE

          Write-Host "[Pytest] 종료 코드: $code"
          "exit_code=$code" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          exit 0

      - name: 서버 health check (테스트 후)
        id: post_health
        if: always()
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $OutputEncoding = [System.Text.Encoding]::UTF8
          $PSDefaultParameterValues['Out-File:Encoding'] = 'utf8'

          $up = $false
          foreach ($healthUrl in @("$env:BASE_URL/health", "$env:BASE_URL/health")) {
            try {
              $resp = Invoke-WebRequest -Uri $healthUrl -TimeoutSec 5 -ErrorAction Stop -UseBasicParsing
              if ($null -ne $resp.StatusCode -and $resp.StatusCode -lt 500) {
                $up = $true
                break
              }
            }
            catch {
            }
          }

          "server_up=$($up.ToString().ToLower())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

          if (-not $up) {
            Write-Host "::warning::테스트 실행 중 API 서버가 다운됐습니다. Crash 로그를 수집합니다."
          }

      - name: Crash 로그 수집 (테스트 후)
        if: always() && steps.post_health.outputs.server_up == 'false'
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          scripts\collect_crash_logs.ps1 -OutputDir "$env:CRASH_LOG_DIR`_post" -Label "post_test"

      - name: Crash 로그 업로드 (테스트 후)
        if: always() && steps.post_health.outputs.server_up == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: crash-logs-post-${{ github.run_id }}
          path: ${{ env.CRASH_LOG_DIR }}_post/
          retention-days: 14

      - name: 서버 로그 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-logs-${{ github.run_id }}
          path: ${{ env.SERVER_LOG_DIR }}/
          retention-days: 14

      - name: pytest 원시 결과 업로드 (generate-report 에서 xlsx 생성됨)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-raw-${{ github.run_id }}
          path: |
            ${{ env.REPORT_DIR }}/report.json
            ${{ env.REPORT_DIR }}/test_diag.jsonl
            ${{ env.REPORT_DIR }}/pytest_output.txt
            ${{ env.REPORT_DIR }}/allure-results/
          retention-days: 3

      - name: 상태 캐시 업데이트
        if: steps.pre_health.outputs.server_up == 'true'
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $OutputEncoding = [System.Text.Encoding]::UTF8

          $cacheDir = ".cache"
          if (-not (Test-Path $cacheDir)) {
            New-Item -ItemType Directory -Path $cacheDir | Out-Null
          }

          $key = "${{ needs.detect-changes.outputs.swagger_hash }}::${{ needs.detect-changes.outputs.server_version }}"
          $key | Out-File -FilePath "$cacheDir\last_run_state.txt" -NoNewline -Encoding utf8
          Write-Host "[Cache] 저장된 상태 키: $key"

      - name: 최종 결과 판정
        if: always()
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $OutputEncoding = [System.Text.Encoding]::UTF8

          $serverUpRaw = "${{ steps.post_health.outputs.server_up }}"
          $exitCodeRaw = "${{ steps.pytest.outputs.exit_code }}"

          Write-Host "[Result] server_up='$serverUpRaw'  pytest_exit='$exitCodeRaw'"

          if ($serverUpRaw -eq "false") {
            Write-Host "::error::API server crashed during test run. Check crash-log artifacts."
            exit 2
          }

          if ($exitCodeRaw -ne "" -and $exitCodeRaw -ne "0") {
            $code = 0
            if ([int]::TryParse($exitCodeRaw, [ref]$code)) {
              Write-Host "::error::pytest failed (exit=$code). Check uploaded test reports."
              exit $code
            }
            else {
              Write-Host "::error::pytest exit code unreadable: '$exitCodeRaw'"
              exit 1
            }
          }

          Write-Host "[Result] Pipeline completed successfully."

      - name: API 서버 종료 (job2 test)
        if: always()
        shell: powershell
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8

          if ($env:SERVER_PID) {
            try {
              Stop-Process -Id ([int]$env:SERVER_PID) -Force -ErrorAction Stop
              Write-Host "[Test Server] stopped PID=$env:SERVER_PID"
            }
            catch {
              Write-Warning "[Test Server] failed to stop PID=$env:SERVER_PID : $($_.Exception.Message)"
            }
          }

  # ══════════════════════════════════════════════════════════════════════════
  # Job 3 — Excel 리포트 통합 생성 (Functional + Robustness 결과 병합)
  # run-pipeline + crash-probe 양쪽이 끝난 뒤 실행.
  # ══════════════════════════════════════════════════════════════════════════
  generate-report:
    name: Excel 리포트 통합 생성
    needs: [detect-changes, run-pipeline, crash-probe]
    if: always() && needs.detect-changes.outputs.should_run == 'true'
    runs-on: [self-hosted, windows]

    env:
      BASE_URL:          ${{ inputs.base_url != '' && inputs.base_url || 'http://127.0.0.1:8080' }}
      REPORT_DIR:        reports
      PROBE_REPORT_DIR:  reports/crash_probe
      SWAGGER_SOURCE:    ${{ needs.detect-changes.outputs.swagger_source }}
      PYTHONIOENCODING:  utf-8

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Python 환경 설정
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 의존성 설치
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── pytest 결과 다운로드 ─────────────────────────────────────────────────
      # run-pipeline / crash-probe 가 다른 runner에서 실행될 수 있으므로
      # 아티팩트를 명시적으로 내려받아 report.json, test_diag.jsonl,
      # allure-results, crash probe report.json 을 항상 최신 상태로 보장한다.
      - name: pytest 결과 다운로드 (pytest-raw)
        uses: actions/download-artifact@v4
        with:
          name: pytest-raw-${{ github.run_id }}
          path: ${{ env.REPORT_DIR }}

      - name: crash-probe 결과 다운로드
        uses: actions/download-artifact@v4
        with:
          name: crash-probe-reports-${{ github.run_id }}
          path: ${{ env.PROBE_REPORT_DIR }}
        continue-on-error: true   # crash-probe job이 skip 됐을 수도 있음

      - name: Excel 리포트 통합 생성
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $OutputEncoding = [System.Text.Encoding]::UTF8
          $env:PYTHONIOENCODING = "utf-8"

          $projectRoot = (Get-Location).Path
          $env:PYTHONPATH = $projectRoot
          Write-Host "[Excel] PYTHONPATH=$projectRoot"

          $openpyxlCheck = python -c "import openpyxl; print('openpyxl', openpyxl.__version__)" 2>&1
          Write-Host "[Excel] $openpyxlCheck"
          if ($LASTEXITCODE -ne 0) {
            pip install "openpyxl>=3.1" --quiet
          }

          $swaggerFile = $env:SWAGGER_SOURCE
          if (-not $swaggerFile) { $swaggerFile = "" }

          python scripts\generate_excel_report.py `
            --report-dir       "$env:REPORT_DIR" `
            --probe-report-dir "$env:PROBE_REPORT_DIR" `
            --base-url         "$env:BASE_URL" `
            --swagger          "$swaggerFile" `
            --config           "config\config.yaml"

          if ($LASTEXITCODE -ne 0) {
            Write-Host "::warning::Excel 리포트 생성 실패 (exit=$LASTEXITCODE)"
          }

      - name: 통합 리포트 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ github.run_id }}
          path: |
            ${{ env.REPORT_DIR }}/summary.html
            ${{ env.REPORT_DIR }}/report.json
            ${{ env.REPORT_DIR }}/pytest_output.txt
            ${{ env.REPORT_DIR }}/allure-results/
            ${{ env.REPORT_DIR }}/test_report.xlsx
            ${{ env.REPORT_DIR }}/test_report2.xlsx
          retention-days: 14

  # ══════════════════════════════════════════════════════════════════════════
  # Job 4 — Robustness Layer (B): Crash Probe
  # 비정상 입력에 대해 서버가 5xx crash 없이 응답하는지 검증한다.
  # ══════════════════════════════════════════════════════════════════════════
  crash-probe:
    name: Crash Probe (Robustness Layer B)
    needs: detect-changes
    if: needs.detect-changes.outputs.should_run == 'true' || inputs.run_crash_probe == 'true'
    runs-on: [self-hosted, windows]
    timeout-minutes: 60

    env:
      BASE_URL:               ${{ inputs.base_url != '' && inputs.base_url || 'http://127.0.0.1:8080' }}
      SERVER_DIR:             C:\Users\sypark5\TestAgent\qfe-api-server-no-license
      SERVER_EXE_NAME:        qfe-server.exe
      SERVER_LICENSE_KEY:     1
      SERVER_MODE_CHOICE:     1
      SERVER_INSTANCE_COUNT:  1
      SERVER_MODEL_PATH:      C:\Users\sypark5\TestAgent\qfe-api-server-no-license\model
      SERVER_DB_PATH:         C:\Users\sypark5\TestAgent\qfe-api-server-no-license\face_database.db
      SERVER_LOG_DIR:         server_logs
      PROBE_REPORT_DIR:       reports/crash_probe
      HEALTH_CHECK_PATH:      /health
      PYTHONIOENCODING:       utf-8

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Python 환경 설정
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 의존성 설치
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 디렉터리 생성
        run: |
          New-Item -ItemType Directory -Path $env:SERVER_LOG_DIR   -Force | Out-Null
          New-Item -ItemType Directory -Path $env:PROBE_REPORT_DIR -Force | Out-Null

      # ─── 서버 기동 ────────────────────────────────────────────────────────────
      - name: 서버 기동 (Crash Probe)
        id: start_probe_server
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $OutputEncoding = [System.Text.Encoding]::UTF8
          $PSDefaultParameterValues['Out-File:Encoding'] = 'utf8'

          $serverExe = Join-Path $env:SERVER_DIR $env:SERVER_EXE_NAME
          $logDir    = $env:SERVER_LOG_DIR
          $stdinFile = Join-Path $logDir "probe_stdin.tmp"
          $stdoutLog = Join-Path $logDir "probe_server_stdout.log"
          $stderrLog = Join-Path $logDir "probe_server_stderr.log"
          $healthUrl = "$env:BASE_URL$env:HEALTH_CHECK_PATH"

          Remove-Item $stdoutLog, $stderrLog -Force -ErrorAction SilentlyContinue

          # 포트 8080 기존 점유 프로세스 정리
          $lines = netstat -ano -p tcp | Select-String ":8080\s"
          foreach ($line in $lines) {
            if ($line.ToString() -match "LISTENING\s+(\d+)") {
              try { Stop-Process -Id ([int]$matches[1]) -Force -ErrorAction SilentlyContinue } catch {}
            }
          }
          Start-Sleep -Seconds 1

          # stdin 파일 사전 작성
          @(
            $env:SERVER_LICENSE_KEY,
            $env:SERVER_MODE_CHOICE,
            $env:SERVER_INSTANCE_COUNT,
            $env:SERVER_MODEL_PATH,
            $env:SERVER_DB_PATH,
            ""
          ) | Set-Content -Path $stdinFile -Encoding ascii

          $proc = Start-Process `
            -FilePath          $serverExe `
            -WorkingDirectory  $env:SERVER_DIR `
            -ArgumentList      "-host 0.0.0.0" `
            -RedirectStandardInput  $stdinFile `
            -RedirectStandardOutput $stdoutLog `
            -RedirectStandardError  $stderrLog `
            -PassThru `
            -WindowStyle Hidden

          Write-Host "[Probe Server] PID=$($proc.Id)"
          "PROBE_SERVER_PID=$($proc.Id)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

          # /health 폴링 (최대 30초)
          $ready = $false
          for ($i = 0; $i -lt 30; $i++) {
            Start-Sleep -Seconds 1
            if ($proc.HasExited) {
              Write-Host "[Probe Server] 프로세스 조기 종료 (exit=$($proc.ExitCode))"
              break
            }
            try {
              $r = Invoke-WebRequest -Uri $healthUrl -UseBasicParsing -TimeoutSec 2
              if ($r.StatusCode -eq 200) { $ready = $true; break }
            } catch {}
          }

          if (-not $ready) {
            Write-Host "[Probe Server] stdout:"; Get-Content $stdoutLog -ErrorAction SilentlyContinue
            Write-Host "[Probe Server] stderr:"; Get-Content $stderrLog -ErrorAction SilentlyContinue
            throw "[Probe Server] 서버 기동 실패 — /health 응답 없음"
          }
          Write-Host "[Probe Server] 준비 완료"

      # ─── Crash Probe 실행 ────────────────────────────────────────────────────
      - name: Crash Probe 실행
        id: crash_probe
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $OutputEncoding = [System.Text.Encoding]::UTF8
          $env:PYTHONIOENCODING = "utf-8"

          $reportDir  = $env:PROBE_REPORT_DIR
          $reportFile = "$reportDir\report.json"
          $healthUrl  = "$env:BASE_URL$env:HEALTH_CHECK_PATH"

          $pytestArgs = @(
            "-m", "pytest",
            "tests/manual/test_crash_probes.py",
            "--base-url", $env:BASE_URL,
            "--import-mode=importlib",
            "--json-report",
            "--json-report-file=$reportFile",
            "--tb=short",
            "-v",
            "-p", "no:randomly"
          )

          $filter = "${{ inputs.probe_filter }}"
          if ($filter) { $pytestArgs += @("-k", $filter) }

          & python @pytestArgs 2>&1 | Tee-Object -FilePath "$reportDir\pytest_output.txt"
          $exitCode = $LASTEXITCODE
          Write-Host "[Probe] pytest 종료코드: $exitCode"

          # 서버 생존 확인
          $alive = $false
          try {
            $r = Invoke-WebRequest -Uri $healthUrl -UseBasicParsing -TimeoutSec 3
            $alive = ($r.StatusCode -eq 200)
          } catch {}

          $crashCount = if ($alive) { 0 } else { 1 }
          $probeExit  = if ($exitCode -eq 0) { "0" } else { "1" }

          Write-Host "[Probe] server_alive=$alive  crash_count=$crashCount"
          "crash_count=$crashCount" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "probe_exit=$probeExit"   | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      # ─── 결과 CSV 생성 ────────────────────────────────────────────────────────
      - name: 결과 CSV 리포트 생성
        if: always()
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $env:PYTHONIOENCODING = "utf-8"

          $pyCode = @'
          import json, csv, os
          from pathlib import Path

          probe_dir   = Path(os.environ.get("PROBE_REPORT_DIR", "reports/crash_probe"))
          report_file = probe_dir / "report.json"
          summary_out = probe_dir / "final_report.csv"

          if not report_file.exists():
              print(f"[WARN] {report_file} not found")
              raise SystemExit(0)

          try:
              data = json.loads(report_file.read_text(encoding="utf-8"))
          except Exception as e:
              print(f"[WARN] JSON parse error: {e}")
              raise SystemExit(0)

          rows = []
          for t in data.get("tests", []):
              call     = t.get("call", {}) or {}
              longrepr = str(call.get("longrepr", ""))
              if   "CRASH_DETECTED" in longrepr:  cls = "CRASH_DETECTED"
              elif "VALIDATION_GAP" in longrepr:  cls = "VALIDATION_GAP"
              elif t["outcome"] == "passed":      cls = "GRACEFUL_REJECTION"
              elif t["outcome"] == "skipped":     cls = "SKIPPED"
              else:                               cls = "OTHER_FAILURE"
              rows.append({
                  "test_id":        t["nodeid"].split("::")[-1],
                  "nodeid":         t["nodeid"],
                  "outcome":        t["outcome"],
                  "classification": cls,
                  "duration_s":     round((t.get("call") or {}).get("duration", 0), 3),
                  "failure_reason": longrepr[:300].replace("\n", " "),
              })

          if rows:
              fields = ["test_id","nodeid","outcome","classification","duration_s","failure_reason"]
              with summary_out.open("w", newline="", encoding="utf-8-sig") as f:
                  w = csv.DictWriter(f, fieldnames=fields)
                  w.writeheader()
                  w.writerows(rows)

              crashes  = sum(1 for r in rows if r["classification"] == "CRASH_DETECTED")
              gaps     = sum(1 for r in rows if r["classification"] == "VALIDATION_GAP")
              graceful = sum(1 for r in rows if r["classification"] == "GRACEFUL_REJECTION")
              sep = "=" * 60
              print(f"\n{sep}")
              print(f"  Crash Probe Results")
              print(f"{sep}")
              print(f"  total probes    : {len(rows)}")
              print(f"  CRASH_DETECTED  : {crashes}  <- server killed by input")
              print(f"  VALIDATION_GAP  : {gaps}  <- accepted bad input (success=True)")
              print(f"  GRACEFUL_REJECT : {graceful}  <- correct error response (OK)")
              print(f"{sep}")
              print(f"  report -> {summary_out}")
          else:
              print("[WARN] no probe results")
          '@

          $tmpPy = Join-Path $env:PROBE_REPORT_DIR "_gen_csv.py"
          $pyCode | Set-Content -Path $tmpPy -Encoding utf8
          python $tmpPy
          Remove-Item $tmpPy -ErrorAction SilentlyContinue

      # ─── 아티팩트 업로드 ─────────────────────────────────────────────────────
      - name: Probe 리포트 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crash-probe-reports-${{ github.run_id }}
          path: ${{ env.PROBE_REPORT_DIR }}/
          retention-days: 30

      - name: Probe 서버 로그 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crash-probe-server-logs-${{ github.run_id }}
          path: ${{ env.SERVER_LOG_DIR }}/
          retention-days: 30

      # ─── 최종 판정 ────────────────────────────────────────────────────────────
      - name: 최종 판정 (Crash Probe)
        if: always()
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8

          $crashCount = "${{ steps.crash_probe.outputs.crash_count }}"
          $probeExit  = "${{ steps.crash_probe.outputs.probe_exit }}"

          Write-Host "[Probe Result] crash_count=$crashCount  probe_exit=$probeExit"

          if ([string]::IsNullOrWhiteSpace($crashCount)) {
            Write-Host "::error::크래시 카운트 정보 없음 (probe 단계 실패)"
            exit 1
          }

          if ([int]$crashCount -gt 0) {
            Write-Host "::error::서버 크래시 감지 — CGO 호출 전 입력 검증 필요"
            exit 2
          }

          if ($probeExit -ne "0") {
            Write-Host "::warning::VALIDATION_GAP 또는 테스트 실패 감지"
            exit 1
          }

          Write-Host "[Probe Result] 모든 프로브 통과 ✓"

      # ─── 서버 종료 (항상) ─────────────────────────────────────────────────────
      - name: 서버 종료 (Crash Probe)
        if: always()
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8

          if ($env:PROBE_SERVER_PID) {
            try {
              Stop-Process -Id ([int]$env:PROBE_SERVER_PID) -Force -ErrorAction SilentlyContinue
              Write-Host "[Probe Server] PID=$env:PROBE_SERVER_PID 종료"
            } catch {}
          }

          # 포트에 남아있는 프로세스 강제 정리
          $lines = netstat -ano -p tcp | Select-String ":8080\s"
          foreach ($line in $lines) {
            if ($line.ToString() -match "LISTENING\s+(\d+)") {
              try { Stop-Process -Id ([int]$matches[1]) -Force -ErrorAction SilentlyContinue } catch {}
            }
          }